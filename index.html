<head>

  <title>Servita</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --black: #181818;
      --crimson: #D10F3F;
      --white: #FAFAFA;
      --gray: #888;
    }

    html { height: 100%; }

    body {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--white);
      color: var(--black);
      padding: 2rem 1.5rem;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.25rem;
    }

    .logo svg {
      display: block;
      width: 148px;
      height: auto;
    }

    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .links a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 0.875rem 1.25rem;
      border-radius: 6px;
      font-size: 0.9375rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      text-decoration: none;
      transition: background 0.15s, color 0.15s, box-shadow 0.15s;
    }

    .links a.primary {
      background: var(--crimson);
      color: var(--white);
      padding: 1.1rem 1.25rem;
      font-size: 1.0625rem;
      font-weight: 600;
      box-shadow: 0 4px 14px rgba(209,15,63,0.3);
    }
    .links a.primary:hover {
      background: #b80d37;
      box-shadow: 0 6px 20px rgba(209,15,63,0.4);
      transform: translateY(-1px);
    }

    .links a.outline {
      background: transparent;
      color: var(--black);
      box-shadow: inset 0 0 0 1.5px var(--black);
    }
    .links a.outline:hover {
      background: var(--black);
      color: var(--white);
    }

    .accent-bar {
      width: 48px;
      height: 3px;
      background: var(--crimson);
      border-radius: 2px;
    }

    footer {
      margin-top: 2.5rem;
      font-size: 0.75rem;
      color: var(--gray);
      letter-spacing: 0.03em;
    }
  </style>
</head>
